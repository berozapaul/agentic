<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UCP Agentic Commerce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .chat-box { height: 65vh; overflow-y: auto; scroll-behavior: smooth; }
        .message { margin-bottom: 1rem; padding: 12px 16px; border-radius: 18px; line-height: 1.5; position: relative; }
        .user { background: #2563eb; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai { background: #f3f4f6; color: #1f2937; align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .step { font-size: 0.75rem; color: #6b7280; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }

        /* IMPROVED: Table & Link Styling within AI bubbles */
        .message table { border-collapse: collapse; width: 100%; margin: 10px 0; background: white; border-radius: 8px; overflow: hidden; }
        .message th, .message td { border: 1px solid #e2e8f0; padding: 8px; text-align: left; font-size: 0.85rem; }
        .message th { background: #f8fafc; }

        /* This makes the Markdown Link look like a professional button */
        .message a {
            display: inline-block;
            background: #00ac1c;
            color: white !important;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
        }
        .message a:hover { background: #3db300; }

        .dot-pulse { display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-2xl bg-white shadow-2xl rounded-2xl overflow-hidden border border-slate-200">
    <div class="bg-blue-700 p-5 text-white flex justify-between items-center">
        <div>
            <h1 class="font-bold text-lg flex items-center gap-2">
                <i class="fas fa-robot"></i> UCP Autonomous Agent
            </h1>
            <p class="text-xs text-blue-100 opacity-80">Connected to Gemini 2.5 • UCP v2026.1</p>
        </div>
        <button onclick="clearChat()" class="text-xs bg-blue-800 hover:bg-blue-900 px-3 py-2 rounded-lg transition-colors flex items-center gap-2">
            <i class="fas fa-trash-alt"></i> Clear Chat
        </button>
    </div>

    <div id="chat" class="chat-box p-6 flex flex-col space-y-4">
        <div class="message ai">
            Hello! I am your autonomous commerce agent. I can discover products and handle checkouts via UCP. What are we looking for?
        </div>
    </div>

    <div class="p-4 bg-slate-50 border-t border-slate-200">
        <div class="flex gap-3 bg-white p-2 rounded-xl border border-slate-300 shadow-sm focus-within:ring-2 focus-within:ring-blue-500 transition-all">
            <input type="text" id="userInput"
                   onkeypress="if(event.key === 'Enter') sendMessage()"
                   class="flex-1 px-3 py-2 focus:outline-none bg-transparent"
                   placeholder="e.g. I want to buy ...">
            <button onclick="sendMessage()" id="sendBtn" class="bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition-all flex items-center justify-center w-12">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');

    // Configure Markdown to handle new lines
    marked.setOptions({ gfm: true, breaks: true });

    async function sendMessage() {
        const msg = input.value.trim();
        if (!msg) return;

        addMessage(msg, 'user');
        input.value = '';

        const loadingId = "load-" + Date.now();
        const loadingHtml = `
                <div id="${loadingId}" class="flex flex-col items-start">
                    <div class="step"><i class="fas fa-sync fa-spin"></i> Agent Reasoning...</div>
                    <div class="message ai italic text-slate-400">
                        Analyzing UCP context <span class="dot-pulse">...</span>
                    </div>
                </div>`;
        chat.insertAdjacentHTML('beforeend', loadingHtml);
        chat.scrollTop = chat.scrollHeight;

        try {
            const response = await fetch(`/ai/shop?message=${encodeURIComponent(msg)}`);
            const result = await response.text();

            document.getElementById(loadingId).remove();

            let label = "Agent Response";
            if(result.includes("Authorized")) label = "Transaction Finalized";
            if(result.includes("Action Required")) label = "Governance Escalation";

            addMessage(result, 'ai', label);

        } catch (err) {
            document.getElementById(loadingId).innerHTML = `
                <div class="message ai bg-red-50 text-red-600 border border-red-200">
                    <i class="fas fa-exclamation-triangle mr-2"></i> Error: Unable to reach the Agent.
                </div>`;
        }
    }

    function addMessage(text, sender, label = null) {
        const icon = sender === 'user' ? 'fa-user' : 'fa-robot';
        const labelHtml = label ? `<div class="step"><i class="fas ${icon}"></i> ${label}</div>` : '';

        // ADJUSTED: Use marked.parse for AI messages to render tables and buttons
        const content = sender === 'ai' ? marked.parse(text) : text;

        const html = `
                <div class="flex flex-col ${sender === 'user' ? 'items-end' : 'items-start'}">
                    ${labelHtml}
                    <div class="message ${sender}">
                        ${content}
                    </div>
                </div>`;
        chat.insertAdjacentHTML('beforeend', html);
        chat.scrollTop = chat.scrollHeight;
    }

    function clearChat() {
        chat.innerHTML = `<div class="message ai">History cleared. How can I help you today?</div>`;
    }
</script>
</body>
</html>
